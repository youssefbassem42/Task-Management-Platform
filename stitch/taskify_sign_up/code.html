<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Sign Up - Taskify</title>
<!-- Fonts: Inter -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Tailwind Config -->

      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-tint": "#0053db",
                    "secondary-fixed-dim": "#7ada98",
                    "inverse-surface": "#2d3133",
                    "surface": "#f7f9fb",

                    "on-secondary": "#ffffff",
                    "secondary": "#006d3a",
                    "tertiary-container": "#996100",
                    "primary-fixed": "#dbe1ff",
                    "surface-container": "#eceef0",
                    "primary": "#004ac6",
                    "on-tertiary-fixed": "#2a1700",
                    "on-error-container": "#93000a",
                    "outline-variant": "#c3c6d7",
                    "surface-variant": "#e0e3e5",
                    "on-background": "#191c1e",
                    "background": "#f7f9fb",
                    "on-error": "#ffffff",
                    "surface-container-low": "#f2f4f6",
                    "secondary-container": "#93f4af",
                    "on-primary-fixed": "#00174b",
                    "primary-fixed-dim": "#b4c5ff",
                    "inverse-on-surface": "#eff1f3",
                    "outline": "#737686",
                    "surface-container-lowest": "#ffffff",
                    "error": "#ba1a1a",
                    "on-surface-variant": "#434655",
                    "tertiary-fixed": "#ffddb8",
                    "on-primary": "#ffffff",
                    "surface-container-high": "#e6e8ea",
                    "error-container": "#ffdad6",
                    "on-surface": "#191c1e",
                    "on-primary-fixed-variant": "#003ea8",
                    "tertiary-fixed-dim": "#ffb95f",
                    "on-primary-container": "#eeefff",
                    "primary-container": "#2563eb",
                    "on-tertiary-container": "#ffeedd",
                    "secondary-fixed": "#96f7b2",
                    "on-secondary-fixed-variant": "#00522a",
                    "inverse-primary": "#b4c5ff",
                    "on-tertiary": "#ffffff",
                    "on-secondary-container": "#00723d",
                    "surface-container-highest": "#e0e3e5",
                    "surface-dim": "#d8dadc",
                    "on-tertiary-fixed-variant": "#653e00",
                    "surface-bright": "#f7f9fb",
                    "on-secondary-fixed": "#00210d"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {},
            "fontFamily": {
                    "headline": ["Inter"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }

<style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .material-symbols-outlined.filled { font-variation-settings: 'FILL' 1; }
    </style>
</head>
<body class="bg-surface min-h-screen flex items-center justify-center p-4 antialiased">
<!-- Main Card Container -->
<main class="w-full max-w-[440px] bg-surface-container-lowest rounded-[24px] shadow-[0_12px_32px_rgba(25,28,30,0.04)] p-8 sm:p-10 relative overflow-hidden">
<!-- Decorative Ambient Glow (Subtle) -->
<div class="absolute -top-24 -left-24 w-48 h-48 bg-primary-fixed-dim/30 rounded-full blur-[64px] pointer-events-none"></div>
<!-- Header -->
<div class="text-center mb-8">
<div class="text-2xl font-black tracking-tighter text-primary mb-6 flex justify-center items-center gap-2">
<span class="material-symbols-outlined filled text-[28px] text-primary" data-icon="task_alt">task_alt</span>
                Taskify
            </div>
<h1 class="text-[32px] leading-tight font-bold text-on-surface tracking-tight mb-2">Create an account</h1>
<p class="text-on-surface-variant font-body">Join the future of fluid productivity.</p>
</div>
<!-- Social Signup -->
<div class="flex gap-4 mb-6">
<button class="flex-1 flex justify-center items-center gap-2 py-2.5 bg-surface-container-lowest ring-1 ring-outline-variant/20 rounded-xl text-on-surface font-medium hover:bg-surface-container-low transition-colors duration-200" type="button">
<!-- SVG Google Icon -->
<svg class="w-5 h-5" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
                Google
            </button>
<button class="flex-1 flex justify-center items-center gap-2 py-2.5 bg-surface-container-lowest ring-1 ring-outline-variant/20 rounded-xl text-on-surface font-medium hover:bg-surface-container-low transition-colors duration-200" type="button">
<!-- SVG Github Icon -->
<svg class="w-5 h-5 fill-on-surface" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"></path>
</svg>
                GitHub
            </button>
</div>
<!-- Divider -->
<div class="flex items-center mb-6">
<div class="flex-grow border-t border-outline-variant/15"></div>
<span class="px-3 text-label-sm font-medium text-on-surface-variant tracking-wider uppercase">Or register with email</span>
<div class="flex-grow border-t border-outline-variant/15"></div>
</div>
<!-- Signup Form -->
<form action="#" class="space-y-5" method="POST">
<!-- Name Input -->
<div class="space-y-1.5">
<label class="block text-label-md font-medium text-on-surface" for="name">Full Name</label>
<div class="relative">
<input class="w-full bg-surface-container-low text-on-surface placeholder:text-on-surface-variant/60 rounded-xl px-4 py-3 focus:bg-surface-container-lowest focus:ring-4 focus:ring-primary/10 focus:outline-none transition-all duration-200 border-none sm:text-sm" id="name" name="name" placeholder="Jane Doe" type="text"/>
</div>
</div>
<!-- Email Input -->
<div class="space-y-1.5">
<label class="block text-label-md font-medium text-on-surface" for="email">Email Address</label>
<div class="relative">
<input class="w-full bg-surface-container-low text-on-surface placeholder:text-on-surface-variant/60 rounded-xl px-4 py-3 focus:bg-surface-container-lowest focus:ring-4 focus:ring-primary/10 focus:outline-none transition-all duration-200 border-none sm:text-sm" id="email" name="email" placeholder="jane@example.com" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-1.5">
<label class="block text-label-md font-medium text-on-surface" for="password">Password</label>
<div class="relative">
<input class="w-full bg-surface-container-low text-on-surface placeholder:text-on-surface-variant/60 rounded-xl px-4 py-3 focus:bg-surface-container-lowest focus:ring-4 focus:ring-primary/10 focus:outline-none transition-all duration-200 border-none sm:text-sm font-mono tracking-widest" id="password" name="password" placeholder="••••••••" type="password" value="Taskify!2024"/>
<!-- View Password Toggle (Decorative) -->
<button class="absolute inset-y-0 right-0 pr-4 flex items-center text-on-surface-variant hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility_off">visibility_off</span>
</button>
</div>
<!-- Password Strength Checklist (Simulating "In Progress" typing state) -->
<div class="pt-3 grid grid-cols-2 gap-y-2 gap-x-2">
<!-- Met Condition -->
<div class="flex items-center gap-1.5 text-secondary">
<span class="material-symbols-outlined filled text-[16px]" data-icon="check_circle">check_circle</span>
<span class="text-label-sm font-medium">8+ characters</span>
</div>
<!-- Met Condition -->
<div class="flex items-center gap-1.5 text-secondary">
<span class="material-symbols-outlined filled text-[16px]" data-icon="check_circle">check_circle</span>
<span class="text-label-sm font-medium">1 uppercase</span>
</div>
<!-- Met Condition -->
<div class="flex items-center gap-1.5 text-secondary">
<span class="material-symbols-outlined filled text-[16px]" data-icon="check_circle">check_circle</span>
<span class="text-label-sm font-medium">1 number</span>
</div>
<!-- Pending Condition -->
<div class="flex items-center gap-1.5 text-on-surface-variant">
<span class="material-symbols-outlined text-[16px]" data-icon="radio_button_unchecked">radio_button_unchecked</span>
<span class="text-label-sm">1 special char</span>
</div>
</div>
</div>
<!-- Submit Button -->
<button class="w-full mt-8 bg-gradient-to-br from-primary-container to-primary text-on-primary py-3.5 rounded-xl font-medium tracking-wide hover:opacity-90 hover:shadow-[0_8px_20px_rgba(37,99,235,0.2)] transition-all duration-200" type="submit">
                Create Account
            </button>
</form>
<!-- Footer Link -->
<p class="mt-8 text-center text-body-sm text-on-surface-variant">
            Already have an account? 
            <a class="font-medium text-primary hover:text-primary-container transition-colors" href="#">Log in</a>
</p>
</main>
</body></html>
