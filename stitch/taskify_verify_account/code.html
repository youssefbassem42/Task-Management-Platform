<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Verify Account - Taskify</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-tint": "#0053db",
                        "secondary-fixed-dim": "#7ada98",
                        "inverse-surface": "#2d3133",
                        "surface": "#f7f9fb",
                        "tertiary": "#784b00",
                        "on-secondary": "#ffffff",
                        "secondary": "#006d3a",
                        "tertiary-container": "#996100",
                        "primary-fixed": "#dbe1ff",
                        "surface-container": "#eceef0",
                        "primary": "#004ac6",
                        "on-tertiary-fixed": "#2a1700",
                        "on-error-container": "#93000a",
                        "outline-variant": "#c3c6d7",
                        "surface-variant": "#e0e3e5",
                        "on-background": "#191c1e",
                        "background": "#f7f9fb",
                        "on-error": "#ffffff",
                        "surface-container-low": "#f2f4f6",
                        "secondary-container": "#93f4af",
                        "on-primary-fixed": "#00174b",
                        "primary-fixed-dim": "#b4c5ff",
                        "inverse-on-surface": "#eff1f3",
                        "outline": "#737686",
                        "surface-container-lowest": "#ffffff",
                        "error": "#ba1a1a",
                        "on-surface-variant": "#434655",
                        "tertiary-fixed": "#ffddb8",
                        "on-primary": "#ffffff",
                        "surface-container-high": "#e6e8ea",
                        "error-container": "#ffdad6",
                        "on-surface": "#191c1e",
                        "on-primary-fixed-variant": "#003ea8",
                        "tertiary-fixed-dim": "#ffb95f",
                        "on-primary-container": "#eeefff",
                        "primary-container": "#2563eb",
                        "on-tertiary-container": "#ffeedd",
                        "secondary-fixed": "#96f7b2",
                        "on-secondary-fixed-variant": "#00522a",
                        "inverse-primary": "#b4c5ff",
                        "on-tertiary": "#ffffff",
                        "on-secondary-container": "#00723d",
                        "surface-container-highest": "#e0e3e5",
                        "surface-dim": "#d8dadc",
                        "on-tertiary-fixed-variant": "#653e00",
                        "surface-bright": "#f7f9fb",
                        "on-secondary-fixed": "#00210d"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {},
                    "fontFamily": {
                        "headline": ["Inter", "sans-serif"],
                        "body": ["Inter", "sans-serif"],
                        "label": ["Inter", "sans-serif"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-surface min-h-screen flex items-center justify-center p-6 font-body antialiased relative overflow-hidden">
<!-- Ambient Background Depth (Fluid Architect Layering) -->
<div class="absolute inset-0 z-0 pointer-events-none overflow-hidden">
<div class="absolute top-[-15%] left-[-10%] w-[50vw] h-[50vw] bg-primary-fixed opacity-40 rounded-full blur-[120px]"></div>
<div class="absolute bottom-[-20%] right-[-10%] w-[60vw] h-[60vw] bg-secondary-fixed opacity-30 rounded-full blur-[140px]"></div>
</div>
<!-- Main Content Canvas -->
<main class="w-full max-w-md relative z-10 flex flex-col items-center">
<!-- Brand/Logo Area (Optional but grounds the transactional screen) -->
<div class="mb-12 flex flex-col items-center">
<span class="text-3xl font-black tracking-tighter text-primary">Taskify</span>
</div>
<!-- Glassy Success Card -->
<div class="w-full bg-surface-container-lowest/70 backdrop-blur-[24px] rounded-xl shadow-[0px_12px_32px_rgba(25,28,30,0.04)] ring-1 ring-outline-variant/15 p-10 flex flex-col items-center text-center">
<!-- Prominent Icon Container (Tonal Layering) -->
<div class="w-24 h-24 bg-primary-fixed rounded-full flex items-center justify-center mb-8 shadow-[0px_8px_24px_rgba(37,99,235,0.15)]">
<span class="material-symbols-outlined text-5xl text-on-primary-fixed" data-icon="mark_email_read">mark_email_read</span>
</div>
<!-- Typography: The Editorial Edge -->
<h1 class="text-3xl font-headline font-bold text-on-surface mb-4 tracking-tight">Verify your account</h1>
<p class="text-base font-body text-on-surface-variant mb-10 leading-relaxed max-w-[280px]">
                Check your email to verify your account. We've sent a secure link to confirm your identity.
            </p>
<!-- Tactile Command (Button) -->
<button class="w-full py-4 px-6 rounded-full bg-gradient-to-br from-primary-container to-primary text-on-primary font-label font-semibold tracking-wide hover:saturate-150 transition-all duration-300 focus:outline-none focus:ring-4 focus:ring-primary/20 shadow-[0px_8px_16px_rgba(0,74,198,0.1)]">
                Open Email App
            </button>
<!-- Secondary Action (Ghost Border logic applied to text link) -->
<button class="mt-6 text-sm font-label font-medium text-primary hover:text-primary-container transition-colors duration-200">
                Didn't receive it? Resend link
            </button>
</div>
</main>
</body></html>
