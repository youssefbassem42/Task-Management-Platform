<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Taskify - Login</title>
<!-- Google Fonts: Inter -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS via CDN -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Tailwind Theme Configuration -->
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-tint": "#0053db",
                    "secondary-fixed-dim": "#7ada98",
                    "inverse-surface": "#2d3133",
                    "surface": "#f7f9fb",
                    "tertiary": "#784b00",
                    "on-secondary": "#ffffff",
                    "secondary": "#006d3a",
                    "tertiary-container": "#996100",
                    "primary-fixed": "#dbe1ff",
                    "surface-container": "#eceef0",
                    "primary": "#004ac6",
                    "on-tertiary-fixed": "#2a1700",
                    "on-error-container": "#93000a",
                    "outline-variant": "#c3c6d7",
                    "surface-variant": "#e0e3e5",
                    "on-background": "#191c1e",
                    "background": "#f7f9fb",
                    "on-error": "#ffffff",
                    "surface-container-low": "#f2f4f6",
                    "secondary-container": "#93f4af",
                    "on-primary-fixed": "#00174b",
                    "primary-fixed-dim": "#b4c5ff",
                    "inverse-on-surface": "#eff1f3",
                    "outline": "#737686",
                    "surface-container-lowest": "#ffffff",
                    "error": "#ba1a1a",
                    "on-surface-variant": "#434655",
                    "tertiary-fixed": "#ffddb8",
                    "on-primary": "#ffffff",
                    "surface-container-high": "#e6e8ea",
                    "error-container": "#ffdad6",
                    "on-surface": "#191c1e",
                    "on-primary-fixed-variant": "#003ea8",
                    "tertiary-fixed-dim": "#ffb95f",
                    "on-primary-container": "#eeefff",
                    "primary-container": "#2563eb",
                    "on-tertiary-container": "#ffeedd",
                    "secondary-fixed": "#96f7b2",
                    "on-secondary-fixed-variant": "#00522a",
                    "inverse-primary": "#b4c5ff",
                    "on-tertiary": "#ffffff",
                    "on-secondary-container": "#00723d",
                    "surface-container-highest": "#e0e3e5",
                    "surface-dim": "#d8dadc",
                    "on-tertiary-fixed-variant": "#653e00",
                    "surface-bright": "#f7f9fb",
                    "on-secondary-fixed": "#00210d"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "2xl": "1.5rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Inter", "sans-serif"],
                    "body": ["Inter", "sans-serif"],
                    "label": ["Inter", "sans-serif"]
            }
          }
        }
      }
    </script>
<style>
        /* Glassmorphism utility for ambient blur */
        .glass-ambient {
            background: rgba(224, 227, 229, 0.4); /* surface-variant at low opacity */
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
        }
        
        /* Ambient shadow for the card */
        .diffuse-shadow {
            box-shadow: 0px 24px 64px -12px rgba(25, 28, 30, 0.08), 0px 12px 24px -8px rgba(25, 28, 30, 0.04);
        }
    </style>
</head>
<body class="bg-surface text-on-surface font-body antialiased min-h-screen flex items-center justify-center relative overflow-hidden">
<!-- Decorative Background Elements for Fluid Depth -->
<div class="absolute top-[-10%] left-[-10%] w-[50vw] h-[50vw] rounded-full bg-primary-fixed-dim opacity-30 blur-[100px] pointer-events-none" data-alt="Abstract soft blue gradient blur in the top left corner creating a sense of depth"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[60vw] h-[60vw] rounded-full bg-secondary-fixed opacity-20 blur-[120px] pointer-events-none" data-alt="Abstract soft mint green gradient blur in the bottom right corner"></div>
<!-- Main Login Card (Surface Container Lowest) -->
<main class="w-full max-w-[440px] px-6 sm:px-0 relative z-10">
<div class="bg-surface-container-lowest rounded-2xl diffuse-shadow p-8 sm:p-10 flex flex-col gap-8">
<!-- Header Section -->
<header class="flex flex-col gap-2">
<div class="flex items-center gap-2 mb-2">
<span class="material-symbols-outlined text-primary text-3xl" style="font-variation-settings: 'FILL' 1;">task_alt</span>
<h1 class="text-2xl font-headline font-black tracking-tighter text-primary">Taskify</h1>
</div>
<h2 class="text-[32px] leading-tight font-headline font-semibold tracking-tight text-on-surface">Welcome back</h2>
<p class="text-on-surface-variant text-sm mt-1">Log in to your workspace to continue.</p>
</header>
<!-- Form Section -->
<form class="flex flex-col gap-6">
<!-- Input Group: Email -->
<div class="flex flex-col gap-2">
<label class="text-xs font-label font-medium text-on-surface-variant uppercase tracking-wider" for="email">Email Address</label>
<div class="relative">
<input class="w-full h-12 px-4 rounded-xl bg-surface-container-highest border-transparent text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all duration-200 outline-none" id="email" placeholder="name@company.com" type="email"/>
</div>
</div>
<!-- Input Group: Password -->
<div class="flex flex-col gap-2">
<label class="text-xs font-label font-medium text-on-surface-variant uppercase tracking-wider" for="password">Password</label>
<div class="relative">
<input class="w-full h-12 pl-4 pr-12 rounded-xl bg-surface-container-highest border-transparent text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all duration-200 outline-none" id="password" placeholder="••••••••" type="password"/>
<button aria-label="Toggle password visibility" class="absolute right-3 top-1/2 -translate-y-1/2 p-1 text-outline hover:text-on-surface transition-colors focus:outline-none" type="button">
<span class="material-symbols-outlined text-[20px]">visibility_off</span>
</button>
</div>
</div>
<!-- Remember Me & Forgot Password -->
<div class="flex items-center justify-between mt-[-8px]">
<label class="flex items-center gap-2 cursor-pointer group">
<div class="relative flex items-center justify-center w-5 h-5">
<input class="peer appearance-none w-5 h-5 rounded-[4px] border-2 border-outline-variant/50 bg-surface-container-highest checked:bg-primary checked:border-primary focus:ring-2 focus:ring-primary/20 focus:ring-offset-0 transition-all cursor-pointer" type="checkbox"/>
<span class="material-symbols-outlined text-on-primary text-[14px] absolute pointer-events-none opacity-0 peer-checked:opacity-100 transition-opacity" style="font-variation-settings: 'FILL' 1;">check</span>
</div>
<span class="text-sm font-body text-on-surface-variant group-hover:text-on-surface transition-colors">Remember me</span>
</label>
<a class="text-sm font-body font-medium text-primary hover:text-primary-container transition-colors focus:outline-none focus:underline" href="#">Forgot password?</a>
</div>
<!-- Primary CTA -->
<button class="w-full h-12 rounded-full bg-gradient-to-br from-primary-container to-primary text-on-primary font-label font-semibold tracking-wide flex items-center justify-center hover:shadow-[0_8px_24px_-8px_rgba(0,74,198,0.5)] hover:brightness-110 active:scale-[0.98] transition-all duration-200 mt-2" type="submit">
                    Sign In
                </button>
</form>
<!-- Divider (No-Line approach, using structural whitespace and text) -->
<div class="relative flex items-center justify-center py-2">
<span class="bg-surface-container-lowest px-4 text-xs font-label font-medium text-outline uppercase tracking-wider relative z-10">Or continue with</span>
<!-- Ghost line behind text for structural feeling without harsh borders -->
<div class="absolute w-full h-[1px] bg-outline-variant opacity-20"></div>
</div>
<!-- Social Logins -->
<div class="flex flex-col gap-3">
<button class="w-full h-12 rounded-xl border border-outline-variant/20 bg-surface-container-lowest hover:bg-surface-container-low text-on-surface font-label font-medium flex items-center justify-center gap-3 transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-primary/20" type="button">
<img alt="Google Logo" class="w-5 h-5" data-alt="Google brand logo icon in full color" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDlanHm6cflvfojoSEhsedOHFjky64YMTLeb06VIS50Va4G3GNS-rX34Ji9swrisGd46VSAfWedjZU9RRThuxfAnaYayRk8VbVaFbzuYS2nEJSnBMocdi1QM9JZYny3SoeO8IKcpu9jF7lxxp6UFaQicKZMfk1gGPu_gjve6GluumqPmMt8vE4v-n1ECsCbZ9e6AAUu2g3s8xRDkCHS3OfCG4KP5gf5LB-9KhfMZh8odmMqsVbtGjlNDwiSPEFtIomsAvWeRKNh0m0e"/>
                    Google
                </button>
<button class="w-full h-12 rounded-xl border border-outline-variant/20 bg-surface-container-lowest hover:bg-surface-container-low text-on-surface font-label font-medium flex items-center justify-center gap-3 transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-primary/20" type="button">
<img alt="GitHub Logo" class="w-5 h-5 opacity-80" data-alt="GitHub brand logo icon in dark gray" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDvWJzLKwYJDICpWdOnaKOITFo7cMIKPTTmSrd_MJWsPR0z7svX_rg4_z5RrNx8CHjIuNYI9eUYM2SHJeK8JVSICL3iynKG--40NLjUMu_WNlIMjWGt8B6lknAifpLef3ShWjBZRxDck1e9mUzeyVQam7Mr3HQLUOOVr6OWzSplDUgP7mdy5GXg1bV-UaJOJuKS-jtGfgJ-6Nw5OecpdbCfINFjrvWuVOhteEF20B4God1WQuzdHkcRQpMmSiQ_QRWZQPCILorZzBzB"/>
                    GitHub
                </button>
</div>
</div>
<!-- Footer Link -->
<p class="text-center text-sm font-body text-on-surface-variant mt-8">
            Don't have an account? 
            <a class="font-medium text-primary hover:text-primary-container transition-colors focus:outline-none focus:underline" href="#">Sign up</a>
</p>
</main>
</body></html>
